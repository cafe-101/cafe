services:
  postgres:
    image: postgres:18.4-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-cafe}
    ports:
      - "${POSTGRES_PORT:-4044}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - cafe-net

  redis:
    image: redis:8.8.0-alpine
    ports:
      - "${REDIS_PORT:-4045}:6379"
    volumes:
      - redisdata:/data
    networks:
      - cafe-net

  localstack:
    image: localstack/localstack:4.14.0
    ports:
      - "${LOCALSTACK_PORT:-4046}:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - localstackdata:/var/lib/localstack
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - cafe-net


volumes:
  pgdata:
  redisdata:
  localstackdata:

networks:
  cafe-net:
    driver: bridge
